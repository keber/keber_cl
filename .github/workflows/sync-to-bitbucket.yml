name: Sync main to Bitbucket and Deploy

on:
  push:
    branches:
      - main

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Bitbucket
        env:
          BITBUCKET_REPOWRITE_TOKEN: ${{ secrets.BITBUCKET_REPOWRITE_TOKEN }}
        run: |
          git remote add bitbucket "https://keberflores:${BITBUCKET_REPOWRITE_TOKEN}@bitbucket.org/keberlabs/keber_cl.git"
          git push --force bitbucket main

      - name: Deploy to server via SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Escribir la llave privada en un archivo temporal
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Agregar el host a known_hosts para evitar el prompt interactivo
          ssh-keyscan -p 22222 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Conectar y ejecutar git pull en el servidor
          ssh -i ~/.ssh/deploy_key \
              -p 22222 \
              -o StrictHostKeyChecking=no \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "cd /opt/easyengine/sites/keber.cl/app/htdocs && git pull origin main"
